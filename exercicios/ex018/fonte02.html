<!DOCTYPE html>
<html lang="ptbr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: love ;
            src: url(fonts/love\ story\ ttf.ttf) format(opentype);

            /*
            Tipos de format()
            -opentype (otf)
            -truetype (ttf)
            -embedded-opentype
            -truetype-aat (Apple Advanced Typography)
            -svg
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1  {
            font-family: love, Arial, Helvetica, sans-serif;
            font-size: 3em;
            font-weight: normal;

        }

    </style>
</head>
<body>
    <H1>Título</H1>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Voluptate fugiat dolores dicta nesciunt iste cum, pariatur voluptatum reiciendis accusantium omnis ipsum doloremque asperiores repudiandae delectus aperiam distinctio sunt cupiditate at!</p>
</body>
</html>
